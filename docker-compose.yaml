services:
  mongodb:
    image: mongo:7
    container_name: mi_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: mongo_db
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: